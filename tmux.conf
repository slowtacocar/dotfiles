set -g mouse on
set -g focus-events on

# True color (24-bit) inside tmux: use a truecolor-capable terminal type, and
# tell tmux the outer terminal (Ghostty) supports RGB so it passes it through.
set -g default-terminal "${TERM}"

# Forward the active pane's title out to the terminal (Ghostty) tab.
# #T is the title the inner program set via OSC (Ghostty's shell integration
# emits the running command + path), so this is a true passthrough.
set -g set-titles on
set -g set-titles-string "#T"

